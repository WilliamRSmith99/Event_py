version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # SQLite database and any other data files persist here
      - bot_data:/app/data
    ports:
      # Stripe webhook receiver — put a reverse proxy (nginx/Caddy) in front
      # and point WEB_BASE_URL at the public HTTPS URL, not localhost
      - "${WEB_PORT:-8080}:8080"

volumes:
  bot_data:
    driver: local
